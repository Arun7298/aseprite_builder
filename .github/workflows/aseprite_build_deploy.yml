name: Build Aseprite (manual latest)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  get-latest:
    name: Get latest Aseprite tag
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.latest.outputs.latest_tag }}
      version_info: ${{ steps.latest.outputs.version_info }}
    steps:
      - name: Fetch latest release metadata
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
          LATEST_TAG=$(echo "${data}" | jq -r '.tag_name')
          VERSION_INFO=$(echo "${data}" | jq -r '.body // ""')

          {
            echo "latest_tag=${LATEST_TAG}"
            echo "version_info<<EOF"
            echo "${VERSION_INFO}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Aseprite (Windows)
    needs: get-latest
    runs-on: windows-latest

    steps:
      - name: Install build tools (ninja, 7zip, git)
        shell: pwsh
        run: |
          choco install -y ninja 7zip git

      # ✅ Official MSBuild environment (no deprecated set-env/add-path)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Optional but helpful: ensures cl.exe environment exists
      - name: Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Skia
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-m81-b607b32047

      - name: Download Skia (if cache miss)
        if: steps.skia-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = "Skia-Windows-Release-X64.zip"
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m81-b607b32047/Skia-Windows-Release-X64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "skia"

      - name: Checkout Aseprite source at latest tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "Latest tag is empty" }

          git clone --depth 1 --branch $tag https://github.com/aseprite/aseprite.git aseprite

          New-Item -ItemType Directory -Force -Path "aseprite/build" | Out-Null

      - name: Configure (CMake + Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cmake `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="../../skia" `
            -DSKIA_LIBRARY_DIR="../../skia/out/Release-x64" `
            ..

      - name: Build (Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ninja aseprite

      - name: Make portable + clean extras
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path "aseprite.ini" -Value "# This file is here so Aseprite behaves as a portable program"

          # Remove helper binaries if present (harmless if missing)
          $toRemove = @(
            "gen","modp_b64_gen",
            "gen.exe","gen.exe.manifest",
            "modp_b64_gen.exe","modp_b64_gen.exe.manifest"
          )
          foreach ($f in $toRemove) {
            if (Test-Path $f) { Remove-Item $f -Force }
          }

      - name: Zip build output
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          $zipName = "Aseprite-$tag-windows.zip"
          & 7z a -tzip $zipName * | Out-Null

      # ✅ Always gives you a downloadable artifact from the Actions run
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows
          path: aseprite/build/bin/Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows.zip
