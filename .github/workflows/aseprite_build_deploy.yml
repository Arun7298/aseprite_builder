name: Build Aseprite (manual latest)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  get-latest:
    name: Get latest Aseprite tag
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.latest.outputs.latest_tag }}
    steps:
      - name: Fetch latest release metadata
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
          LATEST_TAG=$(echo "${data}" | jq -r '.tag_name')
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Aseprite (Windows)
    needs: get-latest
    runs-on: windows-latest

    steps:
      - name: Install tools (git, ninja, 7zip)
        shell: pwsh
        run: |
          choco install -y git ninja 7zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC Dev Cmd (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Skia
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-m81-b607b32047

      - name: Download + extract Skia (if cache miss)
        if: steps.skia-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zip = "Skia-Windows-Release-X64.zip"
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m81-b607b32047/Skia-Windows-Release-X64.zip" -OutFile $zip

          # Extract to a temp folder first so we can normalize layout
          if (Test-Path "skia_tmp") { Remove-Item "skia_tmp" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia_tmp" | Out-Null
          Expand-Archive -Path $zip -DestinationPath "skia_tmp" -Force

          # Create final skia folder
          if (Test-Path "skia") { Remove-Item "skia" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia" | Out-Null

          # Find the real root in the extracted content (handles nested folder zips)
          $candidates = @("skia_tmp") + (Get-ChildItem "skia_tmp" -Directory | ForEach-Object { $_.FullName })
          $root = $null
          foreach ($c in $candidates) {
            if (Test-Path (Join-Path $c "third_party") -or Test-Path (Join-Path $c "out")) {
              $root = $c
              break
            }
          }
          if (-not $root) {
            # fallback: maybe one more nesting
            $nested = Get-ChildItem "skia_tmp" -Recurse -Directory | Where-Object {
              (Test-Path (Join-Path $_.FullName "third_party")) -or (Test-Path (Join-Path $_.FullName "out"))
            } | Select-Object -First 1
            if ($nested) { $root = $nested.FullName }
          }
          if (-not $root) { throw "Could not find Skia root after extraction." }

          # Move contents of the discovered root into ./skia
          Get-ChildItem $root -Force | ForEach-Object {
            Move-Item $_.FullName -Destination "skia" -Force
          }

          Remove-Item "skia_tmp" -Recurse -Force

      - name: Set SKIA_DIR env (absolute) + validate Skia
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $skiaRoot = (Resolve-Path "skia").Path

          # Hard checks for expected structure
          if (-not (Test-Path (Join-Path $skiaRoot "third_party"))) { throw "Skia missing third_party at $skiaRoot" }
          if (-not (Test-Path (Join-Path $skiaRoot "out\Release-x64"))) { throw "Skia missing out\\Release-x64 at $skiaRoot" }

          # This file was missing in your error; verify it's actually present now.
          $icu = Join-Path $skiaRoot "third_party\externals\icu\flutter\icudtl.dat"
          if (-not (Test-Path $icu)) { throw "Skia ICU data file missing: $icu (Skia package/version mismatch or bad extraction)" }

          "SKIA_DIR=$skiaRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SKIA_LIBRARY_DIR=$skiaRoot\out\Release-x64" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Clone Aseprite + submodules at latest tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { throw "Latest tag is empty" }

          git clone --recursive --depth 1 --branch $tag https://github.com/aseprite/aseprite.git aseprite
          cd aseprite
          git submodule update --init --recursive
          cd ..

          New-Item -ItemType Directory -Force -Path "aseprite/build" | Out-Null

      - name: Configure (CMake + Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cmake `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="${{ env.SKIA_DIR }}" `
            -DSKIA_LIBRARY_DIR="${{ env.SKIA_LIBRARY_DIR }}" `
            ..

      - name: Build (Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ninja aseprite

      - name: Make portable + clean extras
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path "aseprite.ini" -Value "# This file is here so Aseprite behaves as a portable program"

          $toRemove = @(
            "gen","modp_b64_gen",
            "gen.exe","gen.exe.manifest",
            "modp_b64_gen.exe","modp_b64_gen.exe.manifest"
          )
          foreach ($f in $toRemove) {
            if (Test-Path $f) { Remove-Item $f -Force }
          }

      - name: Zip build output
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          $zipName = "Aseprite-$tag-windows.zip"
          & 7z a -tzip $zipName * | Out-Null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows
          path: aseprite/build/bin/Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows.zip
