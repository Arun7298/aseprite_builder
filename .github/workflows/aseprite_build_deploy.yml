name: Build and deploy Aseprite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  check-version:
    name: Check latest Aseprite release
    runs-on: ubuntu-latest
    outputs:
      download_url: ${{ steps.version_info.outputs.download_url }}
      latest_tag: ${{ steps.version_info.outputs.latest_tag }}
      should_build: ${{ steps.should_build.outputs.should_build }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Get latest version info
        id: version_info
        shell: bash
        run: |
          set -euo pipefail
          data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
          LATEST_TAG=$(echo "${data}" | jq -r '.tag_name')

          # Try to pick a "source" zip first; fall back to first .zip; then any asset
          DOWNLOAD_URL=$(echo "${data}" | jq -r '
            ( .assets[]?.browser_download_url | select(test("source|src"; "i")) | select(endswith(".zip")) ) // empty
          ' | head -n 1)

          if [ -z "${DOWNLOAD_URL}" ]; then
            DOWNLOAD_URL=$(echo "${data}" | jq -r '
              ( .assets[]?.browser_download_url | select(endswith(".zip")) ) // empty
            ' | head -n 1)
          fi

          if [ -z "${DOWNLOAD_URL}" ]; then
            DOWNLOAD_URL=$(echo "${data}" | jq -r '.assets[]?.browser_download_url' | head -n 1)
          fi

          VERSION_INFO=$(echo "${data}" | jq -r '.body // ""')

          echo "${LATEST_TAG}" > "${LATEST_TAG}.txt"

          {
            echo "latest_tag=${LATEST_TAG}"
            echo "download_url=${DOWNLOAD_URL}"
            echo "version_info<<EOF"
            echo "${VERSION_INFO}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Load version from cache
        id: version_check
        uses: actions/cache@v4
        with:
          path: ${{ steps.version_info.outputs.latest_tag }}.txt
          key: cached_version

      - name: Should we start new build?
        id: should_build
        shell: bash
        run: |
          if [ "${{ steps.version_check.outputs.cache-hit }}" != "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        id: create_release
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version_info.outputs.latest_tag }}
          release_name: Release Aseprite ${{ steps.version_info.outputs.latest_tag }}
          body: |
            ${{ steps.version_info.outputs.version_info }}
          draft: true
          prerelease: false

  build-aseprite:
    name: Build Aseprite
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ FIX: Don't use gha-setup-ninja (it uses add-path). Install ninja via choco.
      - name: Install Ninja + 7zip
        shell: pwsh
        run: |
          choco install -y ninja 7zip

      - name: Get Skia from cache
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-cache

      - name: Download Skia if not in cache
        if: steps.skia-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = "Skia-Windows-Release-X64.zip"
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/download/m81-b607b32047/Skia-Windows-Release-X64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "skia"

      - name: Download Aseprite release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "${{ needs.check-version.outputs.download_url }}" -OutFile "Aseprite-source.zip"
          Expand-Archive -Path "Aseprite-source.zip" -DestinationPath "aseprite"
          New-Item -ItemType Directory -Force -Path "aseprite/build" | Out-Null

      # Keep your VS environment setup
      - name: Setup VS Dev Env
        uses: seanmiddleditch/gha-setup-vsdevenv@v1

      - name: Run CMake (Ninja)
        working-directory: aseprite/build
        shell: cmd
        run: cmake -DCMAKE_BUILD_TYPE=%BUILD_TYPE% -DCMAKE_IGNORE_PATH="C:/ProgramData/chocolatey/bin/;C:/Strawberry/c/bin/" -DLAF_BACKEND=skia -DSKIA_DIR=../../skia -DSKIA_LIBRARY_DIR=../../skia/out/Release-x64 -G Ninja ..

      - name: Run Ninja
        working-directory: aseprite/build
        shell: cmd
        run: ninja aseprite

      - name: Clean up build
        working-directory: aseprite/build/bin
        shell: bash
        run: rm -f gen modp_b64_gen gen.exe gen.exe.manifest modp_b64_gen.exe modp_b64_gen.exe.manifest

      - name: Make portable
        working-directory: aseprite/build/bin
        shell: bash
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini

      - name: Create release zip
        working-directory: aseprite/build/bin
        shell: cmd
        run: 7z -tzip a "Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}.zip" *

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.check-version.outputs.upload_url }}
          asset_path: aseprite/build/bin/Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}.zip
          asset_name: Aseprite-${{ needs.check-version.outputs.latest_tag }}-${{ runner.os }}.zip
          asset_content_type: application/zip
