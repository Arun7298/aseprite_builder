name: Build Aseprite (manual latest)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  get-meta:
    name: Get latest Aseprite Source.zip + latest Skia m124 tag
    runs-on: ubuntu-latest
    outputs:
      aseprite_tag: ${{ steps.meta.outputs.aseprite_tag }}
      aseprite_source_zip_url: ${{ steps.meta.outputs.aseprite_source_zip_url }}
      skia_tag: ${{ steps.meta.outputs.skia_tag }}
    steps:
      - name: Fetch latest Aseprite release + Source.zip URL
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Latest Aseprite release
          r=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
          A_TAG=$(echo "$r" | jq -r '.tag_name')

          SRC_ZIP=$(echo "$r" | jq -r '
            .assets[]?.browser_download_url
            | select(test("Source\\.zip$"; "i"))
          ' | head -n 1)

          if [ -z "$SRC_ZIP" ]; then
            echo "ERROR: Could not find Source.zip in latest Aseprite release assets."
            echo "$r" | jq -r '.assets[]?.name'
            exit 1
          fi

          # Latest Skia release tag for aseprite-m124 branch (tag names look like m124-<hash>)
          s=$(curl -sL "https://api.github.com/repos/aseprite/skia/releases?per_page=100")
          SKIA_TAG=$(echo "$s" | jq -r '
            [ .[] | select(.tag_name | test("^m124-")) ][0].tag_name
          ')

          if [ -z "$SKIA_TAG" ] || [ "$SKIA_TAG" = "null" ]; then
            echo "ERROR: Could not find a Skia release tag starting with m124-"
            exit 1
          fi

          {
            echo "aseprite_tag=$A_TAG"
            echo "aseprite_source_zip_url=$SRC_ZIP"
            echo "skia_tag=$SKIA_TAG"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Aseprite (Windows)
    needs: get-meta
    runs-on: windows-latest

    steps:
      - name: Install tools (ninja, 7zip)
        shell: pwsh
        run: |
          choco install -y ninja 7zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC Dev Cmd (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Skia (m124)
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-${{ needs.get-meta.outputs.skia_tag }}

      - name: Download + extract Skia (m124) if cache miss
        if: steps.skia-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $skiaTag = "${{ needs.get-meta.outputs.skia_tag }}"

          $zipName = "Skia-Windows-Release-X64.zip"
          $uri = "https://github.com/aseprite/skia/releases/download/$skiaTag/$zipName"
          Write-Host "Downloading Skia: $uri"
          Invoke-WebRequest -Uri $uri -OutFile $zipName

          # Extract to temp then normalize to ./skia
          if (Test-Path "skia_tmp") { Remove-Item "skia_tmp" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia_tmp" | Out-Null
          Expand-Archive -Path $zipName -DestinationPath "skia_tmp" -Force

          if (Test-Path "skia") { Remove-Item "skia" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia" | Out-Null

          function IsSkiaRoot([string]$p) {
            return (Test-Path (Join-Path $p "out")) -or (Test-Path (Join-Path $p "third_party"))
          }

          $root = $null
          $cands = @((Resolve-Path "skia_tmp").Path) + (Get-ChildItem "skia_tmp" -Directory | ForEach-Object { $_.FullName })
          foreach ($c in $cands) { if (IsSkiaRoot $c) { $root = $c; break } }
          if (-not $root) {
            $nested = Get-ChildItem "skia_tmp" -Recurse -Directory | Where-Object { IsSkiaRoot $_.FullName } | Select-Object -First 1
            if ($nested) { $root = $nested.FullName }
          }
          if (-not $root) { throw "Could not find Skia root after extraction." }

          Get-ChildItem $root -Force | ForEach-Object { Move-Item $_.FullName -Destination "skia" -Force }
          Remove-Item "skia_tmp" -Recurse -Force

      - name: Set SKIA env (absolute) + basic validation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $skiaRoot = (Resolve-Path "skia").Path

          $libDir = Join-Path $skiaRoot "out\Release-x64"
          $lib    = Join-Path $libDir "skia.lib"

          if (-not (Test-Path $libDir)) { throw "Skia missing: $libDir" }
          if (-not (Test-Path $lib))    { throw "Skia missing: $lib" }

          "SKIA_DIR=$skiaRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SKIA_LIBRARY_DIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SKIA_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download + extract Aseprite Source.zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "${{ needs.get-meta.outputs.aseprite_source_zip_url }}"

          Invoke-WebRequest -Uri $url -OutFile "Aseprite-Source.zip"
          Expand-Archive -Path "Aseprite-Source.zip" -DestinationPath "aseprite_src" -Force

          if (Test-Path "aseprite") { Remove-Item "aseprite" -Recurse -Force }
          $dirs = Get-ChildItem "aseprite_src" -Directory
          if ($dirs.Count -eq 1) {
            Move-Item $dirs[0].FullName "aseprite"
          } else {
            New-Item -ItemType Directory -Force -Path "aseprite" | Out-Null
            Get-ChildItem "aseprite_src" -Force | ForEach-Object { Move-Item $_.FullName "aseprite" -Force }
          }
          Remove-Item "aseprite_src" -Recurse -Force

          New-Item -ItemType Directory -Force -Path "aseprite/build" | Out-Null

      - name: Configure (CMake + Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cmake `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="${{ env.SKIA_DIR }}" `
            -DSKIA_LIBRARY_DIR="${{ env.SKIA_LIBRARY_DIR }}" `
            -DSKIA_LIBRARY="${{ env.SKIA_LIBRARY }}" `
            ..

      - name: Build (Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ninja aseprite

      - name: Make portable
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path "aseprite.ini" -Value "# Portable mode"

      - name: Zip build output
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-meta.outputs.aseprite_tag }}"
          $zipName = "Aseprite-$tag-windows.zip"
          & 7z a -tzip $zipName * | Out-Null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.get-meta.outputs.aseprite_tag }}-windows
          path: aseprite/build/bin/Aseprite-${{ needs.get-meta.outputs.aseprite_tag }}-windows.zip
