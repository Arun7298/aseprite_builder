name: Build Aseprite (manual latest)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  get-latest:
    name: Get latest Aseprite tag + required Skia tag
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.meta.outputs.latest_tag }}
      skia_tag: ${{ steps.meta.outputs.skia_tag }}
    steps:
      - name: Fetch latest release tag
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
          LATEST_TAG=$(echo "${data}" | jq -r '.tag_name')
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Detect Skia tag from Aseprite repo workflows
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          LATEST_TAG="${{ steps.rel.outputs.latest_tag }}"

          # 1) Try the most likely workflow filenames first
          candidates=(
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/build.yml"
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/build.yaml"
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/ci.yml"
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/ci.yaml"
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/aseprite.yml"
            "https://raw.githubusercontent.com/aseprite/aseprite/${LATEST_TAG}/.github/workflows/aseprite.yaml"
          )

          skia_tag=""

          for u in "${candidates[@]}"; do
            txt=$(curl -fsSL "$u" || true)
            if [ -n "$txt" ]; then
              skia_tag=$(echo "$txt" | grep -oE 'aseprite/skia/releases/download/[^/"]+' | head -n 1 | sed -E 's#.*download/##')
              if [ -n "$skia_tag" ]; then
                echo "Found skia tag in $u: $skia_tag"
                break
              fi
            fi
          done

          # 2) If still not found, list workflow directory via GitHub API and scan each workflow file
          if [ -z "$skia_tag" ]; then
            api="https://api.github.com/repos/aseprite/aseprite/contents/.github/workflows?ref=${LATEST_TAG}"
            items=$(curl -fsSL "$api" | jq -r '.[]?.download_url' || true)

            if [ -n "$items" ]; then
              while IFS= read -r dl; do
                [ -z "$dl" ] && continue
                txt=$(curl -fsSL "$dl" || true)
                if [ -n "$txt" ]; then
                  skia_tag=$(echo "$txt" | grep -oE 'aseprite/skia/releases/download/[^/"]+' | head -n 1 | sed -E 's#.*download/##')
                  if [ -n "$skia_tag" ]; then
                    echo "Found skia tag in workflow $dl: $skia_tag"
                    break
                  fi
                fi
              done <<< "$items"
            fi
          fi

          if [ -z "$skia_tag" ]; then
            echo "Could not detect Skia tag for Aseprite ${LATEST_TAG} from workflows."
            exit 1
          fi

          {
            echo "latest_tag=${LATEST_TAG}"
            echo "skia_tag=${skia_tag}"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Aseprite (Windows)
    needs: get-latest
    runs-on: windows-latest

    steps:
      - name: Install tools (git, ninja, 7zip)
        shell: pwsh
        run: |
          choco install -y git ninja 7zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC Dev Cmd (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Skia (versioned)
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-${{ needs.get-latest.outputs.skia_tag }}

      - name: Download + extract Skia (if cache miss)
        if: steps.skia-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $skiaTag = "${{ needs.get-latest.outputs.skia_tag }}"
          if ([string]::IsNullOrWhiteSpace($skiaTag)) { throw "skia_tag is empty" }

          $zip = "Skia-Windows-Release-X64.zip"
          $uri = "https://github.com/aseprite/skia/releases/download/$skiaTag/$zip"
          Write-Host "Downloading Skia: $uri"
          Invoke-WebRequest -Uri $uri -OutFile $zip

          # Extract to temp first, then normalize into ./skia
          if (Test-Path "skia_tmp") { Remove-Item "skia_tmp" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia_tmp" | Out-Null
          Expand-Archive -Path $zip -DestinationPath "skia_tmp" -Force

          if (Test-Path "skia") { Remove-Item "skia" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "skia" | Out-Null

          function IsSkiaRoot([string]$p) {
            return (Test-Path (Join-Path $p "third_party")) -or (Test-Path (Join-Path $p "out"))
          }

          $root = $null
          $candidates = @((Resolve-Path "skia_tmp").Path) + (Get-ChildItem "skia_tmp" -Directory | ForEach-Object { $_.FullName })

          foreach ($c in $candidates) {
            if (IsSkiaRoot $c) { $root = $c; break }
          }

          if (-not $root) {
            $nested = Get-ChildItem "skia_tmp" -Recurse -Directory | Where-Object { IsSkiaRoot $_.FullName } | Select-Object -First 1
            if ($nested) { $root = $nested.FullName }
          }

          if (-not $root) { throw "Could not find Skia root after extraction." }

          Get-ChildItem $root -Force | ForEach-Object {
            Move-Item $_.FullName -Destination "skia" -Force
          }

          Remove-Item "skia_tmp" -Recurse -Force

      - name: Set SKIA env (absolute)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $skiaRoot = (Resolve-Path "skia").Path
          "SKIA_DIR=$skiaRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SKIA_LIBRARY_DIR=$skiaRoot\out\Release-x64" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Clone Aseprite + submodules at latest tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          git clone --recursive --depth 1 --branch $tag https://github.com/aseprite/aseprite.git aseprite
          cd aseprite
          git submodule update --init --recursive
          cd ..
          New-Item -ItemType Directory -Force -Path "aseprite/build" | Out-Null

      - name: Configure (CMake + Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}" `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="${{ env.SKIA_DIR }}" `
            -DSKIA_LIBRARY_DIR="${{ env.SKIA_LIBRARY_DIR }}" `
            ..

      - name: Build (Ninja)
        working-directory: aseprite/build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ninja aseprite

      - name: Make portable
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path "aseprite.ini" -Value "# Portable mode"

      - name: Zip build output
        working-directory: aseprite/build/bin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ needs.get-latest.outputs.latest_tag }}"
          $zipName = "Aseprite-$tag-windows.zip"
          & 7z a -tzip $zipName * | Out-Null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows
          path: aseprite/build/bin/Aseprite-${{ needs.get-latest.outputs.latest_tag }}-windows.zip
